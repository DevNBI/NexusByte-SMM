<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Incomplete</title>
<link rel="icon" href="https://devnbi.github.io/AnimeHub/assets/media/branding/rounded-logo.png">
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
border-radius:10px;
}

body{
background:#111111;
color:#ffffff;
font-family:Segoe UI,Arial,sans-serif;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
}

.wrapper{
width:98%;
display:flex;
flex-direction:column;
align-items:center;
gap:14px;
}

h3{
font-size:24px;
font-weight:600;
}

.subtext{
font-size:15px;
opacity:0.75;
}

button{
margin-top:10px;
padding:12px 22px;
background:#1a1a1a;
color:#ffffff;
border:1px solid #333333;
cursor:pointer;
transition:0.2s;
font-size:14px;
}

button:hover{
background:#2a2a2a;
}

button:active{
transform:scale(0.98);
}

@media(max-width:600px){
h3{
font-size:20px;
}

.subtext{
font-size:14px;
}

button{
padding:10px 18px;
font-size:13px;
}
}
</style>
</head>
<body>

<div class="wrapper">
<h3>Page incomplete</h3>
<div class="subtext">Please come back soon!</div>
<button onclick="window.location.href='https://devnbi.github.io/AnimeHub/main/home.html'">Go to home</button>
</div>

</body>
</html>
